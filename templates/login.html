<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTTrade - Login</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <div x-data="loginData()" x-init="init()">

        <!-- Main Content -->
        <main class="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Welcome Back</h2>
                        <p>Sign in to FASTTrade to access the student & faculty marketplace</p>
                    </div>

                    <!-- Login Form -->
                    <form class="auth-form compact-form" @submit.prevent="handleLogin">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <div class="input-container">
                                <i class="fas fa-envelope input-icon"></i>
                                <input 
                                    type="email" 
                                    id="email" 
                                    x-model="email" 
                                    @input="validateEmail"
                                    placeholder="Enter your email"
                                    :class="{ 'error': emailError }"
                                    autocomplete="username"
                                    required
                                >
                            </div>
                            <span class="error-message" x-show="emailError" x-text="emailError"></span>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-container">
                                <i class="fas fa-lock input-icon"></i>
                                <input 
                                    :type="showPassword ? 'text' : 'password'" 
                                    id="password" 
                                    x-model="password" 
                                    @input="validatePassword"
                                    placeholder="Enter your password"
                                    :class="{ 'error': passwordError }"
                                    autocomplete="current-password"
                                    required
                                >
                                <button type="button" class="toggle-password" @click="showPassword = !showPassword" :aria-label="showPassword ? 'Hide password' : 'Show password'">
                                    <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                            <span class="error-message" x-show="passwordError" x-text="passwordError"></span>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" x-model="rememberMe">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password" @click.prevent="loginError = 'Forgot password? Please contact admin.'">Forgot password?</a>
                        </div>

                        <template x-if="loginError">
                            <div class="error-message" style="margin-bottom: 1rem; text-align: center;" x-text="loginError"></div>
                        </template>

                        <button type="submit" class="btn btn-primary btn-block" :disabled="isLoading">
                            <span x-show="!isLoading"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                            <span x-show="isLoading"><i class="fas fa-spinner fa-spin"></i> Signing in...</span>
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html" @click.prevent="window.location.href='register.html'">Sign up</a></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <div id="footer"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Initialize AOS
            AOS.init({
                duration: 800,
                easing: 'ease-out',
                once: true
            });
        });
    </script>
    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
