<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTTrade - Register</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <div x-data="{ mobileMenuOpen: false }">

        <!-- Main Content -->
        <main class="main-content">
            <div class="auth-container" x-data="registerForm()">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Create an Account</h2>
                        <p>Join the FAST community marketplace</p>
                    </div>
                    
                    <form class="auth-form compact-form" @submit.prevent="submitRegistration" x-show="!showVerification">
                        <template x-if="emailError || phoneError || passwordError || confirmPasswordError">
                            <div class="error-message" style="margin-bottom: 1rem; text-align: center;">Please fix the errors below and try again.</div>
                        </template>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="fullName">Full Name</label>
                                <div class="input-container">
                                    <i class="fas fa-user input-icon"></i>
                                    <input 
                                        type="text" 
                                        id="fullName" 
                                        x-model="fullName" 
                                        @input="validateName"
                                        placeholder="Enter your full name"
                                        :class="{ 'error': nameError }"
                                    >
                                </div>
                                <span class="error-message" x-show="nameError" x-text="nameError"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <div class="input-container">
                                    <i class="fas fa-phone input-icon"></i>
                                    <input 
                                        type="tel" 
                                        id="phone" 
                                        x-model="phone" 
                                        placeholder="Enter your number" 
                                        required
                                        @input="validatePhone"
                                    >
                                </div>
                                <p class="error-message" x-show="phoneError" x-text="phoneError"></p>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <div class="input-container">
                                <i class="fas fa-envelope input-icon"></i>
                                <input 
                                    type="email" 
                                    id="email" 
                                    x-model="email" 
                                    @input="validateEmail"
                                    placeholder="Enter your email"
                                    :class="{ 'error': emailError }"
                                >
                            </div>
                            <span class="error-message" x-show="emailError" x-text="emailError"></span>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="password">Password</label>
                                <div class="input-container">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input 
                                        :type="showPassword ? 'text' : 'password'" 
                                        id="password" 
                                        x-model="password" 
                                        @input="validatePassword"
                                        placeholder="Create a password"
                                        :class="{ 'error': passwordError }"
                                    >
                                    <button type="button" class="toggle-password" @click="showPassword = !showPassword">
                                        <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                    </button>
                                </div>
                                <span class="error-message" x-show="passwordError" x-text="passwordError"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <div class="input-container">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input 
                                        :type="showConfirmPassword ? 'text' : 'password'" 
                                        id="confirmPassword" 
                                        x-model="confirmPassword" 
                                        @input="validateConfirmPassword"
                                        placeholder="Confirm your password"
                                        :class="{ 'error': confirmPasswordError }"
                                    >
                                    <button type="button" class="toggle-password" @click="showConfirmPassword = !showConfirmPassword">
                                        <i :class="showConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                    </button>
                                </div>
                                <span class="error-message" x-show="confirmPasswordError" x-text="confirmPasswordError"></span>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block" :disabled="isSubmitting || !isFormValid">
                            <span x-show="!isSubmitting">Register</span>
                            <span x-show="isSubmitting"><i class="fas fa-spinner fa-spin"></i> Registering...</span>
                        </button>
                    </form>
                    
                    <!-- Verification Form (shown after registration) -->
                    <div class="verification-form" x-show="showVerification">
                        <div class="verification-message">
                            <i class="fas fa-envelope-open-text verification-icon"></i>
                            <h3>Verify Your Email</h3>
                            <p>A PIN has been sent to your email for verification.</p>
                        </div>
                        
                        <div class="pin-container">
                            <template x-for="(digit, index) in pinDigits" :key="index">
                                <input 
                                    type="text" 
                                    maxlength="1" 
                                    class="pin-digit" 
                                    x-model="pinDigits[index]"
                                    @input="moveFocus($event, index)"
                                    @keydown.backspace="handleBackspace($event, index)"
                                >
                            </template>
                        </div>
                        
                        <p class="error-message" x-show="pinError" x-text="pinError"></p>
                        
                        <button 
                            type="button" 
                            class="btn btn-primary btn-block" 
                            @click="verifyPin"
                            :disabled="!isPinComplete || isVerifying"
                        >
                            <span x-show="!isVerifying">Verify</span>
                            <span x-show="isVerifying"><i class="fas fa-spinner fa-spin"></i> Verifying...</span>
                        </button>
                        
                        <p class="resend-pin">
                            Didn't receive the PIN? <a href="#" @click.prevent="resendPin">Resend</a>
                        </p>
                    </div>
                    
                    <div class="auth-footer">
                        <p>Already have an account? <a href="login.html">Login</a></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <div id="footer"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Initialize AOS
            AOS.init({
                duration: 800,
                easing: 'ease-out',
                once: true
            });
        });
    </script>
    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
