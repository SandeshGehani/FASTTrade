<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTTrade - Create Listing</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/create-listing.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- No additional JS libraries -->
    <!-- AOS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <div x-data="{ mobileMenuOpen: false, profileDropdownOpen: false, loggedIn: !!localStorage.getItem('access_token') }">

        <!-- Main Content -->
        <main class="main-content">
            <div class="create-listing-container" x-data="createListingData()" x-init="init()">
                <div class="create-listing-header" data-aos="fade-up">
                    <h2>Create New Listing</h2>
                    <p>Sell your items to the FAST community</p>
                </div>
                
                <div class="create-listing-form-container" data-aos="fade-up" data-aos-delay="100">
                    <!-- Error Message -->
                    <div x-show="error" class="error-message" x-text="error"></div>

                    <form class="create-listing-form" @submit.prevent="submitListing">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="title">Item Title</label>
                                <div class="input-container">
                                    <i class="fas fa-tag input-icon"></i>
                                    <input 
                                        type="text" 
                                        id="title" 
                                        x-model="listing.title" 
                                        placeholder="Enter a descriptive title" 
                                        required
                                    >
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="price">Price (Rs.)</label>
                                <div class="input-container">
                                    <i class="fas fa-rupee-sign input-icon"></i>
                                    <input 
                                        type="number" 
                                        id="price" 
                                        x-model="listing.price" 
                                        placeholder="Enter price" 
                                        required
                                        min="0"
                                        step="0.01"
                                    >
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <div class="input-container">
                                    <i class="fas fa-folder input-icon"></i>
                                    <select id="category" x-model="listing.category_id" required>
                                        <option value="">Select a category</option>
                                        <template x-if="categories.length === 0">
                                            <option value="" disabled>Loading categories...</option>
                                        </template>
                                        <template x-for="category in categories" :key="category.id">
                                            <option :value="category.id" x-text="category.name"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="condition">Condition (1-10)</label>
                                <div class="input-container">
                                    <i class="fas fa-star input-icon"></i>
                                    <input 
                                        type="number" 
                                        id="condition" 
                                        x-model="listing.condition" 
                                        placeholder="Rate condition from 1-10" 
                                        required
                                        min="1"
                                        max="10"
                                    >
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="description">Description</label>
                            <div class="textarea-container">
                                <textarea 
                                    id="description" 
                                    x-model="listing.description" 
                                    placeholder="Describe your item in detail" 
                                    rows="5"
                                    required
                                ></textarea>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Item Image</label>
                            <div class="image-upload-container" @click="triggerFileInput">
                                <template x-if="!imagePreview">
                                    <div class="image-upload-placeholder">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                        <p>Click to upload an image</p>
                                        <span>JPG, PNG or GIF, max 5MB</span>
                                    </div>
                                </template>
                                <template x-if="imagePreview">
                                    <div class="image-preview-container">
                                        <img :src="imagePreview" alt="Item preview" class="image-preview">
                                        <button type="button" class="remove-image-btn" @click.stop="removeImage">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                </template>
                                <input 
                                    type="file" 
                                    id="item-image" 
                                    accept="image/*" 
                                    class="hidden-file-input"
                                    @change="handleImageUpload"
                                >
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <a href="listing.html" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary" :disabled="isSubmitting">
                                <span x-show="!isSubmitting">Create Listing</span>
                                <span x-show="isSubmitting"><i class="fas fa-spinner fa-spin"></i> Creating...</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <div id="footer"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/create-listing.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await auth.init();
            auth.requireLogin();
        });
    </script>
    <script>
        AOS.init();
    </script>
</body>
</html>
