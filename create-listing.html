<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTTrade - Create Listing</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/create-listing.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- No additional JS libraries -->
    <!-- AOS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Check authentication and handle redirection
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                const currentPath = window.location.pathname;
                window.location.href = `login.html?next=${encodeURIComponent(currentPath)}`;
                return;
            }
        });
    </script>
</head>
<body>
    <div x-data="{ mobileMenuOpen: false, profileDropdownOpen: false, loggedIn: !!localStorage.getItem('access_token') }">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-logo">
                    <a href="index.html">
                        <svg width="150" height="30" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                            <text x="140" y="165" font-family="Arial" font-size="108" font-weight="bold">
                                <tspan fill="#F9F9F9">FAST</tspan><tspan fill="#CEC0FF">Trade</tspan><tspan fill="#F9F9F9">.</tspan>
                            </text>
                        </svg>
                    </a>
                </div>
                
                <!-- Mobile menu button -->
                <button class="mobile-menu-button" @click="mobileMenuOpen = !mobileMenuOpen">
                    <i class="fas fa-bars"></i>
                </button>
                
                <!-- Desktop Navigation -->
                <div class="navbar-links desktop-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="listing.html" class="nav-link">Listing</a>
                    <a href="about.html" class="nav-link">About</a>
                    <template x-if="loggedIn">
                        <a href="messages.html" class="nav-link">Chat</a>
                        <a href="profile.html" class="nav-link">Profile</a>
                    </template>
                </div>
                
                <!-- Search Bar -->
                <div class="search-container desktop-search">
                    <input type="text" placeholder="Search for items..." class="search-input">
                    <button class="search-button">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                
                <!-- Profile Section -->
                <div class="profile-section desktop-profile" x-data="{ loggedIn: !!localStorage.getItem('access_token'), profileDropdownOpen: false }">
                    <template x-if="loggedIn">
                        <div>
                            <div class="profile-img-container" @click="profileDropdownOpen = !profileDropdownOpen">
                                <img :src="localStorage.getItem('profile_image') || 'https://via.placeholder.com/40'" alt="Profile" class="profile-img">
                            </div>
                            <!-- Profile Dropdown -->
                            <div x-show="profileDropdownOpen" @click.away="profileDropdownOpen = false" class="profile-dropdown">
                                <a href="profile.html" class="dropdown-item">My Profile</a>
                                <a href="messages.html" class="dropdown-item">Messages</a>
                                <template x-if="localStorage.getItem('user_email') === 'k232004@nu.edu.pk'">
                                    <a href="admin.html" class="dropdown-item">
                                        <i class="fas fa-shield-alt"></i> Admin Panel
                                    </a>
                                </template>
                                <a href="#" class="dropdown-item" @click="localStorage.clear(); window.location.href='index.html'">Logout</a>
                            </div>
                        </div>
                    </template>
                    <template x-if="!loggedIn">
                        <button class="btn btn-primary" @click="window.location.href='login.html'">Join</button>
                    </template>
                </div>
            </div>
            
            <!-- Mobile Menu -->
            <div x-show="mobileMenuOpen" @click.away="mobileMenuOpen = false" class="mobile-menu">
                <div class="search-container mobile-search">
                    <input type="text" placeholder="Search for items..." class="search-input">
                    <button class="search-button">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div class="navbar-links mobile-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="listing.html" class="nav-link">Listing</a>
                    <a href="about.html" class="nav-link">About</a>
                    <template x-if="loggedIn">
                        <a href="messages.html" class="nav-link">Chat</a>
                        <a href="profile.html" class="nav-link">Profile</a>
                        <a href="#" class="nav-link" @click="localStorage.clear(); window.location.href='index.html'">Logout</a>
                    </template>
                    <template x-if="!loggedIn">
                        <a href="#" class="nav-link" @click="window.location.href='login.html'">Join</a>
                    </template>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="create-listing-container" x-data="createListingData()" x-init="init()">
                <div class="create-listing-header" data-aos="fade-up">
                    <h2>Create New Listing</h2>
                    <p>Sell your items to the FAST community</p>
                </div>
                
                <div class="create-listing-form-container" data-aos="fade-up" data-aos-delay="100">
                    <!-- Error Message -->
                    <div x-show="error" class="error-message" x-text="error"></div>

                    <form class="create-listing-form" @submit.prevent="submitListing">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="title">Item Title</label>
                                <div class="input-container">
                                    <i class="fas fa-tag input-icon"></i>
                                    <input 
                                        type="text" 
                                        id="title" 
                                        x-model="listing.title" 
                                        placeholder="Enter a descriptive title" 
                                        required
                                    >
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="price">Price (Rs.)</label>
                                <div class="input-container">
                                    <i class="fas fa-rupee-sign input-icon"></i>
                                    <input 
                                        type="number" 
                                        id="price" 
                                        x-model="listing.price" 
                                        placeholder="Enter price" 
                                        required
                                        min="0"
                                        step="0.01"
                                    >
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <div class="input-container">
                                    <i class="fas fa-folder input-icon"></i>
                                    <select id="category" x-model="listing.category_id" required>
                                        <option value="">Select a category</option>
                                        <template x-if="categories.length === 0">
                                            <option value="" disabled>Loading categories...</option>
                                        </template>
                                        <template x-for="category in categories" :key="category.id">
                                            <option :value="category.id" x-text="category.name"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="condition">Condition (1-10)</label>
                                <div class="input-container">
                                    <i class="fas fa-star input-icon"></i>
                                    <input 
                                        type="number" 
                                        id="condition" 
                                        x-model="listing.condition" 
                                        placeholder="Rate condition from 1-10" 
                                        required
                                        min="1"
                                        max="10"
                                    >
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="description">Description</label>
                            <div class="textarea-container">
                                <textarea 
                                    id="description" 
                                    x-model="listing.description" 
                                    placeholder="Describe your item in detail" 
                                    rows="5"
                                    required
                                ></textarea>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Item Image</label>
                            <div class="image-upload-container" @click="triggerFileInput">
                                <template x-if="!imagePreview">
                                    <div class="image-upload-placeholder">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                        <p>Click to upload an image</p>
                                        <span>JPG, PNG or GIF, max 5MB</span>
                                    </div>
                                </template>
                                <template x-if="imagePreview">
                                    <div class="image-preview-container">
                                        <img :src="imagePreview" alt="Item preview" class="image-preview">
                                        <button type="button" class="remove-image-btn" @click.stop="removeImage">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                </template>
                                <input 
                                    type="file" 
                                    id="item-image" 
                                    accept="image/*" 
                                    class="hidden-file-input"
                                    @change="handleImageUpload"
                                >
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <a href="/marketplace.html" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary" :disabled="isSubmitting">
                                <span x-show="!isSubmitting">Create Listing</span>
                                <span x-show="isSubmitting"><i class="fas fa-spinner fa-spin"></i> Creating...</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-logo">
                    <svg width="150" height="30" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                        <text x="0" y="165" font-family="Arial" font-size="98" font-weight="bold">
                            <tspan fill="#F9F9F9">FAST</tspan><tspan fill="#CEC0FF">Trade</tspan><tspan fill="#F9F9F9">.</tspan>
                        </text>
                    </svg>
                </div>
                <div class="footer-social">
                    <a href="https://www.linkedin.com/in/sandesh-kumar7/" class="social-link" target="_blank"><i class="fab fa-linkedin"></i></a>
                    <a href="https://www.instagram.com/sandeshgehanii/" class="social-link" target="_blank"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 FASTTrade. All right are reserved | Sandesh - 23K-2004</p>
            </div>
        </footer>
    </div>

    <script src="js/create-listing.js"></script>
    <script>
        AOS.init();
    </script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll('a.nav-link[href=\"login.html\"]').forEach(function(link) {
            const current = window.location.pathname + window.location.search;
            link.href = "login.html?next=" + encodeURIComponent(current);
        });
    });
    </script>
</body>
</html>
