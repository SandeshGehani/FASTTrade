<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTTrade - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</head>
<body>
    <div x-data="loginData()" x-init="init()">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-logo">
                    <a href="index.html">
                        <svg width="150" height="30" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                            <text x="140" y="165" font-family="Arial" font-size="108" font-weight="bold">
                                <tspan fill="#F9F9F9">FAST</tspan><tspan fill="#CEC0FF">Trade</tspan><tspan fill="#F9F9F9">.</tspan>
                            </text>
                        </svg>
                    </a>
                </div>
                
                <!-- Mobile menu button -->
                <button class="mobile-menu-button" @click="mobileMenuOpen = !mobileMenuOpen">
                    <i class="fas fa-bars"></i>
                </button>
                
                <!-- Desktop Navigation -->
                <div class="navbar-links desktop-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="listing.html" class="nav-link">Listing</a>
                    <a href="about.html" class="nav-link">About</a>
                </div>
            </div>
            
            <!-- Mobile Menu -->
            <div x-show="mobileMenuOpen" @click.away="mobileMenuOpen = false" class="mobile-menu">
                <div class="navbar-links mobile-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="listing.html" class="nav-link">Listing</a>
                    <a href="about.html" class="nav-link">About</a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Welcome Back</h2>
                        <p>Sign in to FASTTrade to access the student & faculty marketplace</p>
                    </div>

                    <!-- Login Form -->
                    <form class="auth-form compact-form" @submit.prevent="handleLogin">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <div class="input-container">
                                <i class="fas fa-envelope input-icon"></i>
                                <input 
                                    type="email" 
                                    id="email" 
                                    x-model="email" 
                                    @input="validateEmail"
                                    placeholder="Enter your email"
                                    :class="{ 'error': emailError }"
                                    autocomplete="username"
                                    required
                                >
                            </div>
                            <span class="error-message" x-show="emailError" x-text="emailError"></span>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-container">
                                <i class="fas fa-lock input-icon"></i>
                                <input 
                                    :type="showPassword ? 'text' : 'password'" 
                                    id="password" 
                                    x-model="password" 
                                    @input="validatePassword"
                                    placeholder="Enter your password"
                                    :class="{ 'error': passwordError }"
                                    autocomplete="current-password"
                                    required
                                >
                                <button type="button" class="toggle-password" @click="showPassword = !showPassword" :aria-label="showPassword ? 'Hide password' : 'Show password'">
                                    <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                </button>
                            </div>
                            <span class="error-message" x-show="passwordError" x-text="passwordError"></span>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" x-model="rememberMe">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password" @click.prevent="loginError = 'Forgot password? Please contact admin.'">Forgot password?</a>
                        </div>

                        <template x-if="loginError">
                            <div class="error-message" style="margin-bottom: 1rem; text-align: center;" x-text="loginError"></div>
                        </template>

                        <button type="submit" class="btn btn-primary btn-block" :disabled="isLoading">
                            <span x-show="!isLoading"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                            <span x-show="isLoading"><i class="fas fa-spinner fa-spin"></i> Signing in...</span>
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html" @click.prevent="window.location.href='register.html'">Sign up</a></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-logo">
                    <svg width="150" height="30" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                        <text x="-80" y="165" font-family="Arial" font-size="148" font-weight="bold">
                            <tspan fill="#F9F9F9">FAST</tspan><tspan fill="#CEC0FF">Trade</tspan><tspan fill="#F9F9F9">.</tspan>
                        </text>
                    </svg>
                </div>
                <div class="footer-social">
                    <a href="https://www.linkedin.com/in/sandesh-kumar7/" class="social-link" target="_blank"><i class="fab fa-linkedin"></i></a>
                    <a href="https://www.instagram.com/sandeshgehanii/" class="social-link" target="_blank"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 FASTTrade. All right are reserved | Sandesh - 23K-2004</p>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Initialize AOS
            AOS.init({
                duration: 800,
                easing: 'ease-out',
                once: true
            });
        });
    </script>
    <script src="js/login.js"></script>
</body>
</html>
