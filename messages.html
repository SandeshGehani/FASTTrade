<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTTrade - Messages</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/messages.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
    if (!localStorage.getItem('access_token')) {
        window.location.href = 'login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search);
    }
    </script>
</head>
<body>
    <div x-data="{ mobileMenuOpen: false, profileDropdownOpen: false, contactsOpen: true }">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-logo">
                    <a href="index.html">
                        <svg width="150" height="30" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                            <text x="140" y="165" font-family="Arial" font-size="108" font-weight="bold">
                                <tspan fill="#F9F9F9">FAST</tspan><tspan fill="#CEC0FF">Trade</tspan><tspan fill="#F9F9F9">.</tspan>
                            </text>
                        </svg>
                    </a>
                </div>
                
                <!-- Mobile menu button -->
                <button class="mobile-menu-button" @click="mobileMenuOpen = !mobileMenuOpen">
                    <i class="fas fa-bars"></i>
                </button>
                
                <!-- Desktop Navigation -->
                <div class="navbar-links desktop-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="listing.html" class="nav-link">Listing</a>
                    <a href="about.html" class="nav-link">About</a>
                    <template x-if="loggedIn">
                        <a href="profile.html" class="nav-link">Profile</a>
                    </template>
                </div>
                
                <!-- Profile Section -->
                <div class="profile-section desktop-profile" x-data="{ loggedIn: !!localStorage.getItem('access_token'), profileDropdownOpen: false }">
                    <template x-if="loggedIn">
                        <div>
                            <div class="profile-img-container" @click="profileDropdownOpen = !profileDropdownOpen">
                                <img :src="localStorage.getItem('profile_image') || 'https://via.placeholder.com/40'" alt="Profile" class="profile-img">
                            </div>
                            <!-- Profile Dropdown -->
                            <div x-show="profileDropdownOpen" @click.away="profileDropdownOpen = false" class="profile-dropdown">
                                <a href="profile.html" class="dropdown-item">My Profile</a>
                                <a href="messages.html" class="dropdown-item">Messages</a>
                                <template x-if="localStorage.getItem('user_email') === 'k232004@nu.edu.pk'">
                                    <a href="admin.html" class="dropdown-item">
                                        <i class="fas fa-shield-alt"></i> Admin Panel
                                    </a>
                                </template>
                                <a href="#" class="dropdown-item" @click="localStorage.clear(); window.location.href='index.html'">Logout</a>
                            </div>
                        </div>
                    </template>
                    <template x-if="!loggedIn">
                        <button class="btn btn-primary" @click="window.location.href='login.html'">Join</button>
                    </template>
                </div>
            </div>
            
            <!-- Mobile Menu -->
            <div x-show="mobileMenuOpen" @click.away="mobileMenuOpen = false" class="mobile-menu">
                <div class="search-container mobile-search">
                    <div class="search-input-wrapper">
                        <input type="text" placeholder="Search for items..." class="search-input">
                        <button class="search-button">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="navbar-links mobile-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="listing.html" class="nav-link">Listing</a>
                    <a href="about.html" class="nav-link">About</a>
                    <template x-if="loggedIn">
                        <a href="profile.html" class="nav-link">Profile</a>
                        <a href="#" class="nav-link" @click="localStorage.clear(); window.location.reload();">Logout</a>
                    </template>
                    <template x-if="!loggedIn">
                        <a href="#" class="nav-link" @click="window.location.href='login.html'">Join</a>
                    </template>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" x-data="messagesData()" x-init="init()">
            <div class="messages-container">
                <!-- Contacts List -->
                <aside class="contacts-panel">
                    <div class="contacts-header">
                        <h3>Chats</h3>
                    </div>
                    <div class="contacts-search">
                        <div class="input-container">
                            <i class="fas fa-search input-icon"></i>
                            <input type="text" placeholder="Search contacts..." x-model="searchQuery" @input="searchContacts">
                        </div>
                    </div>
                    <div class="contacts-list">
                        <template x-for="contact in filteredContacts" :key="contact.id">
                            <div class="contact-item" :class="{ 'active': selectedContact && selectedContact.id === contact.id }" @click="selectContact(contact)">
                                <div class="contact-avatar">
                                    <img :src="contact.avatar" :alt="contact.name">
                                </div>
                                <div class="contact-info">
                                    <h4 class="contact-name" x-text="contact.name"></h4>
                                    <p class="contact-last-message" x-text="contact.lastMessage"></p>
                                </div>
                                <div class="contact-meta">
                                    <span class="message-time" x-text="contact.lastMessageTime"></span>
                                    <template x-if="contact.unreadCount > 0">
                                        <span class="unread-count" x-text="contact.unreadCount"></span>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div class="empty-contacts" x-show="filteredContacts.length === 0">
                        <i class="fas fa-search empty-icon"></i>
                        <p>No contacts found</p>
                    </div>
                </aside>
                <!-- Chat Window -->
                <section class="chat-window">
                    <template x-if="errorMessage">
                        <div class="chat-error">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Error</h3>
                            <p x-text="errorMessage"></p>
                        </div>
                    </template>
                    <template x-if="!errorMessage && selectedContact">
                        <div class="chat-container">
                            <div class="chat-header">
                                <div class="chat-contact-info">
                                    <div class="contact-avatar large">
                                        <img :src="selectedContact.avatar" :alt="selectedContact.name">
                                    </div>
                                    <div class="contact-details">
                                        <h4 class="contact-name" x-text="selectedContact.name"></h4>
                                        <p class="contact-batch" x-text="selectedContact.batch"></p>
                                    </div>
                                </div>
                            </div>
                            <div class="chat-messages" id="chat-messages" x-ref="messagesContainer">
                                <template x-for="(message, index) in messages" :key="index">
                                    <div class="message-row" :class="{ 'sent': message.sent, 'received': !message.sent }">
                                        <div class="message-bubble">
                                            <span class="message-text" x-text="message.text"></span>
                                            <span class="message-time" x-text="message.time"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <div class="chat-input-bar">
                                <input type="text" class="chat-input-field" placeholder="Type a message..." x-model="newMessage" @keyup.enter="sendMessage">
                                <button class="chat-input-btn send-btn" @click="sendMessage" :disabled="!newMessage.trim()"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </template>
                    <template x-if="!selectedContact && !errorMessage">
                        <div class="chat-placeholder">
                            <i class="fas fa-comments fa-3x"></i>
                            <h3>Select a contact to start chatting</h3>
                    </div>
                    </template>
                </section>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-logo">
                    <svg width="150" height="30" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                        <text x="-80" y="165" font-family="Arial" font-size="148" font-weight="bold">
                            <tspan fill="#F9F9F9">FAST</tspan><tspan fill="#CEC0FF">Trade</tspan><tspan fill="#F9F9F9">.</tspan>
                        </text>
                    </svg>
                </div>
                <div class="footer-social">
                    <a href="https://www.linkedin.com/in/sandesh-kumar7/" class="social-link" target="_blank"><i class="fab fa-linkedin"></i></a>
                    <a href="https://www.instagram.com/sandeshgehanii/" class="social-link" target="_blank"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 FASTTrade. All right are reserved | Sandesh - 23K-2004</p>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Initialize AOS
            AOS.init({
                duration: 800,
                easing: 'ease-out',
                once: true
            });

            document.querySelectorAll('a.nav-link[href=\"login.html\"]').forEach(function(link) {
                const current = window.location.pathname + window.location.search;
                link.href = "login.html?next=" + encodeURIComponent(current);
            });
        });
    </script>
    <script src="js/messages.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var img = document.querySelector('.profile-img');
      if (img) {
        img.src = localStorage.getItem('profile_image') || 'https://via.placeholder.com/40';
      }
    });
    </script>
</body>
</html>
